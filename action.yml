name: CCW Extension Deployment
description: Deploy Extension To CCW
inputs:
  file:
    description: The Extension file you want to deploy
    default: dist/index.js
    required: true
  project-file-id:
    description: the sb3 file md5
    required: true
  user-dir:
    description: the user directory for sb3
    required: true
  token:
    description: ccw token
    required: true
runs:
  using: node24
  main: dist/index.cjs
